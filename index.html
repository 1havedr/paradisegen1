<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paradise Gen</title>

<script src="https://js.stripe.com/v3/"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Sora:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050505;
  --card:#0c0c0c;
  --border:rgba(255,255,255,0.08);
  --red:#ff2a2a;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter,sans-serif;
  background:var(--bg);
  color:#fff;
  overflow-x:hidden;
}

/* NAV */
.nav{
  position:fixed;
  top:0;
  width:100%;
  backdrop-filter:blur(12px);
  background:rgba(5,5,5,0.6);
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  z-index:1000;
}

.nav h1{
  font-family:Sora;
  font-size:1.2rem;
}

.nav a{
  color:#aaa;
  text-decoration:none;
  margin-left:25px;
  transition:.2s;
}

.nav a:hover{color:#fff}

/* BG glow */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle at 20% 0%, rgba(255,0,0,.2), transparent 60%);
  z-index:-1;
  animation:move 10s linear infinite;
}

@keyframes move{
  0%{transform:translate(0,0)}
  50%{transform:translate(-10%,10%)}
  100%{transform:translate(0,0)}
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-family:Sora;
  font-size:3.5rem;
  letter-spacing:2px;
}

.hero span{color:var(--red)}

.hero p{color:#777;margin-top:10px}

/* SECTION */
.section{
  padding:120px 20px;
  max-width:1100px;
  margin:auto;
}

/* PRODUCTS */
.products{
  display:flex;
  gap:25px;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:30px;
  width:260px;
  transition:.3s;
}

.card:hover{
  transform:translateY(-8px);
  border-color:rgba(255,0,0,.4);
  box-shadow:0 0 30px rgba(255,0,0,.15);
}

.price{
  color:var(--red);
  font-size:1.8rem;
  margin:10px 0;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:linear-gradient(90deg,#ff0000,#ff3a3a);
  color:#fff;
  cursor:pointer;
}

button:hover{
  box-shadow:0 0 15px rgba(255,0,0,.5);
}

/* SCROLL ANIMATIONS */
.reveal{
  opacity:0;
  transform:translateY(60px) scale(.98);
  filter:blur(6px);
  transition:1s cubic-bezier(.16,1,.3,1);
}

.reveal.active{
  opacity:1;
  transform:translateY(0) scale(1);
  filter:blur(0);
}

/* PARALLAX */
.parallax{
  transform:translateY(var(--scroll,0));
  transition:transform .1s linear;
}

/* FOOTER */
.footer{
  padding:40px;
  text-align:center;
  border-top:1px solid var(--border);
  color:#666;
}
</style>
</head>

<body>

<div class="nav">
  <h1><span style="color:#ff2a2a">PARADISE</span> GEN</h1>
  <div>
    <a href="#">Home</a>
    <a href="#products">Products</a>
    <a href="https://discord.gg/Cm6JDT6v6w" target="_blank">Discord</a>
  </div>
</div>

<div class="hero parallax">
  <h1><span>PARADISE</span> GEN</h1>
  <p>Instant delivery accounts</p>
</div>

<div class="section reveal" id="products">
  <div class="products">

    <div class="card">
      <h3>Unbanned Hypixel</h3>
      <div class="price">$1.00</div>
      <button onclick="buy1()">Buy</button>
    </div>

    <div class="card">
      <h3>Banned Hypixel</h3>
      <div class="price">$0.50</div>
      <button onclick="buy2()">Buy</button>
    </div>

  </div>
</div>

<div class="footer reveal">
  Join the Discord for support  
</div>

<script>
const stripe = Stripe("pk_test_XXXX");

function buy1(){
  stripe.redirectToCheckout({
    lineItems:[{price:"price_XXXX",quantity:1}],
    mode:"payment",
    successUrl:window.location.origin+"/success.html",
    cancelUrl:window.location.href
  });
}

function buy2(){
  stripe.redirectToCheckout({
    lineItems:[{price:"price_XXXX",quantity:1}],
    mode:"payment",
    successUrl:window.location.origin+"/success.html",
    cancelUrl:window.location.href
  });
}

/* reveal on scroll */
const reveals = document.querySelectorAll(".reveal");

function animate(){
  reveals.forEach(el=>{
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      el.classList.add("active");
    }
  });

  document.querySelectorAll(".parallax").forEach(el=>{
    el.style.setProperty("--scroll", window.scrollY * -0.2 + "px");
  });
}

window.addEventListener("scroll", animate);
animate();
</script>

</body>
</html>
